syntax = "proto3";

package automation.pricing.v1;

message Money {
  string currency = 1;
  int64 units = 2;
  int32 nanos = 3;
}

message Quote {
  string quote_id = 1;
  string sku = 2;
  int32 quantity = 3;
  Money unit_price = 4;
  Money total_price = 5;
  string pricing_rule = 6;
}

message GetQuoteRequest {
  string sku = 1;
  int32 quantity = 2;
  string currency = 3;
  int32 price_shift_basis_points = 4;
  int32 delay_ms = 5;
}

message GetQuoteResponse {
  Quote quote = 1;
  string correlation_id = 2;
}

message StreamQuotesRequest {
  string sku = 1;
  int32 quantity = 2;
  string currency = 3;
  int32 updates_count = 4;
  int32 interval_ms = 5;
  int32 initial_shift_basis_points = 6;
  int32 step_basis_points = 7;
  int32 fail_after_item = 8;
}

message StreamQuotesResponse {
  Quote quote = 1;
  int32 sequence_number = 2;
  bool final = 3;
  string correlation_id = 4;
}

service PricingService {
  rpc GetQuote(GetQuoteRequest) returns (GetQuoteResponse);
  rpc StreamQuotes(StreamQuotesRequest) returns (stream StreamQuotesResponse);
}
